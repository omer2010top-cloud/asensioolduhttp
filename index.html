<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarı Yarıya Site</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            position: relative;
            font-family: Arial, sans-serif;
        }

        .half {
            width: 50%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .left {
            background-image: url('296622-1765459707.webp');
        }

        .right {
            background-image: url('663360064_1462380475425329_9110071533866272750_n.jpg');
        }

        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>

    <div class="half left"></div>
    <div class="half right"></div>

    <div class="center-text">asensio oldu http</div>

</body>
</html>
